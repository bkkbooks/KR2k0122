body:
  text: 吳中舊事地理類八雜記之屬提要臣等謹案呉中舊事一巻元陸友仁撰友仁字輔之平江人此書紀其鄉之軼聞舊迹以補地志之闕其體例則小説家流也其中如辨呉㑹呉下之名及陸贄墓張翰宅和令坊高彪碑之類皆足資考證紀陳長方潘兑事紀朱勔事亦足以資法戒其他如范純祐慕容嵓卿事頗為不經李璋事亦頗猥瑣盖襍記之書誌神怪資諧笑自唐已然不足為友仁訾也惟所載鹿苑臺銘記云永和七年陸機建碑王羲之書則二人時代邈不相及殊失之於不考耳此書刋本頗訛脱今以永樂大典所載互合補正備元人説部之一種雖篇帙無多要與妄誕之談異也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:f93d4e88df4e7e9c8a2a4959111a67a5ef7eb0f858a73fa94e7f8fdfdb598fa9
