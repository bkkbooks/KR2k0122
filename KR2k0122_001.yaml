body:
  text: 吳中舊事元陸友仁撰吳中山水清嘉衣冠所聚今其子孫往往淪落而無聞其遺風餘俗邈不可考故因暇日參記舊聞凡一百餘事庶資郡乘之萬一云爾李育字仲蒙吳人馮當世榜第四人登第能為詩性髙簡故官不甚顯亦少知之者與大父朝公善按大父上疑有脫字尤愛其詩先君嘗得其親書飛騎橋一篇于朝公字畫亦清麗以為珍玩詩云魏人野戰如鷹揚吳人水戰如龍驤氣吞魏王唯吳王建旗敢到新城傍霸主心當萬夫敵麾下蒼皇無羽􅢅塗窮事變接短兵生死之間不容息馬奔津橋橋半徹洶洶有聲如地裂蛟怒橫飛秋水空鶚驚徑度秋雲缺奮迅金羈汗沾臆濟主艱難天借力艱難始是扶主時平日主君須愛惜蔣侍郎堂家藏楊文公與王魏公一帖用半幅紙有折痕記其略云昨夜有進士蔣堂擕所作文來極可喜不敢不布聞謹封拜呈後有蘇子瞻跋云夜得一士旦而告人察其情若喜而不寐者蔣不知何從得之在其孫彛處程光祿師孟吳下人樂易純質喜為詩效白樂天而尤簡直至老不改吳語與王荆公有場屋之舊荆公頗喜之晚相遇猶如布衣時自江州致仕歸吳按宋史師孟致仕在知青州之後此云江州恐誤適荆公在蔣山留數日時巳年七十餘荆公戲之曰公尚欲仕乎曰猶可更作一郡荆公大笑知其無隱情也蘇子美云吳中渚茶野醖足以銷憂蓴鱸稻蟹足以適口又多髙僧隱君子佛廟勝絶家有園林珍花竒石曲池髙臺魚鳥留連不覺日暮遂終此不去諸珣字永叔隱君子也鄉人罕識之章丞相程光祿尤與之厚善林德祖虙云余家自伯父皇考洎諸父奉王大母大母來居于蘇著籍此州者五十年矣今帶城橋儒學坊為吾家榜也橫山之寶華華山之博士塢吾家三世之所葬也華山有智顯寺宋紹聖四年知樞密院事林希請為功德寺遂加慈嚴之額林氏墳在寺後穹窿寺有米元章題草書壁髙宗嘗欲取去有狀元不曽移徙按盧熊蘇州府志云寺舊有米芾大書詩兩壁今毁不存矣又吳郡志載吳中讖語曰穹窿石移狀元來歸淳熙初山中大石一夕自東徙西吳縣黃由遂狀元及第云云此假文不連屬疑有脫誤林樞密家在寶華山下故書手澤多為人所得余家藏其手書左傳訓練二帙末有題字云姑蘇林子中借録于家藏辛卯仲秋中浣歲大水霖雨不止案此下疑有脫文紹興中有于古塜得故外黃令髙君碑𨽻書殘缺乃東漢髙彪漢書傳云彪吳郡無錫人後遷內黃令帝敕同寮臨送祖于上東門彪到官有德政上書薦縣人申屠蟠等卒于官史以外黃為內黃誤矣當以墓碑為正稿簡贅筆按宋詩紀事章淵作稿簡贅筆原本訛稿簡為橋蘭今改正隸釋云紹興中吳郡取土於郭外而得之今碑在郡齋章伯深淵言吳中風俗上元夜鐃鼓歌吹喧街市謂之旱划船龍溪曽旻彥和會稽賀鑄方回二家書最多其子獻之朝各命以官皆經彥和方回手校二家並居郡中今西山羊腸嶺有彥和之父墓碑范文正公長子監簿純祐自幼警悟明敏過人公所料事必先知之善能出神公在西邉凡虜情機事皆預遙知蓋出神至虜廷得之故公每制勝料敵如神者監簿之力也一日因出神為人所驚自此神觀不足未幾而亡時甚少也張子賢聞之公之族子誾彥和云平江自朱勔用事花朩之竒異者盡移供禁籞下至墟墓間珍朩亦邅發鑿山林所餘惟合抱成圍或擁腫檏散者乃保天年建炎已酉冬至庚戌春宣撫使周望留姑蘇諸將之兵斧斤日往樵斫俱盡棟梁之材析而為薪莫敢如何諸山皆童矣亦草朩一時之厄耶宣和間朱勔應奉進為節度使子汝賢慶陽軍承宣使汝功靜江軍承宣使汝文閣門宣贊舍人弟績閣門宣贊舍人汝􅢅朝奉大夫直龍圖閣汝舟明州觀察使汝明榮州刺史孫絺繹約絢緯綬按原本綬作緩今改正並閣門宣贊舍人綽紳並閣門祗候一時軒裳之盛未之有也靖康初籍其家悉追奪竄嶺表宣和癸已春勔採石太湖黿山得一石長四丈有竒廣得其半玲瓏嵌空竅穴千百非雕刻所能成也并郡宅後池光亭臺上有白公檜世傳白樂天手植也創造二大舟費八千緡以獻時常潤間河渠淺淤重載不前乃先繪圖以聞宸翰賜石名神運昭功敷慶萬年之峯是秋方至京師詔置于艮嶽建炎庚戌二月二十五日金兵陷平江府兩浙宣撫使周望移軍退保昆山縣泊舟馬鞍山下湖邉吏方用印忽有風旋轉入舟印與文移盡捲入水相視駭愕使水工探之不獲望懼北兵之來襲也欲亟走屯通惠鎮為失巾所撓留吏求之吏禱于馬鞍山神曰靜濟侯者曰茍不獲將得罪必焚廟而仃縣宰亦懼乃作堰捍水以踏車涸之畚鍤如雲鑿數尺始得之已淪于泥中矣墨莊漫録新唐書載張籍和州烏江人而張洎作張司業詩序云籍蘇州吳郡人二者無可考證今烏江縣有張司業宅則疑傳載為是豫因以詩集考之有贈陸暢詩云共踏長安街裏塵吳州獨作未歸身胥門舊宅今誰住按原本吳州作吳門誰住作誰在今從本集改正君過西塘與問人由是可知籍吳人無疑矣抑亦嘗寓烏江耶府署之南名吳會黃外反坊按後漢蔡雍傳亡命江海逺迹吳會音與會計之會同注引會稽髙遷亭竹椽為笛事又諸葛孔明説荆州形勢曰東連吳會王羲之為會稽內史時朝廷賦役繁重吳會尤甚石崇論伐吳之功曰吳會僭逆指言孫氏則吳會當是吳郡與會稽猶言吳越也蓋不獨謂姑蘇今坊名吳會未知何據而然前漢吳王濞傳上患吳會輕悍即吳郡會稽也吳人多謂人為呆子唐韻云呆小犬癡不解事者慶歷間安定胡先生在吳學蘇子美被誣退居滄浪亭太常博士陳虞卿壯歲致仕而歸吳中稱三賢人胡先生以教子美以文虞卿以行名動天下程若筠吳中道士善畫嘗召至京師秀峯寺西二十里至三洋有福林寺寺門石幢刻唐咸通年又云上當慶忌尼寺蓋寺舊名云字巳漫滅吳農忌五月甲申乙酉雨則大小麥不收諺云甲申猶自可乙酉怕殺我范致能有會散夜步詩云忘却下樓扶我誰接㒿顛倒酒沾衣貪看雪樣滿街月不上籃輿步砌歸步砌吳語也雕簷綺户倚晴空如畫曽是吳王舊臺榭自浣紗人去後落日平蕪行雲斷幾見花開花謝凄涼闌干外一簇江山多少圖王共爭霸莫間愁金杯瀲灔對酒當歌歡娛地夢中興亡休話漸倚遍西風晚潮生明月裏鷺鷀背人飛下余每登姑蘇臺讀潘庭堅柱間洞仙歌輒徘徊不忍去元統三年冬郡守濟南張侯新修此臺易去舊柱遂不復存庭堅淳祐中嘗為浙西茶鹽司幕幹官鄧道樞字應叔綿州人端平甲午隨魏文靖公舟下瞿塘峽越五年抵吳案此下疑有脫文僧妙應者俗姓童鄉人呼為童和尚妙于刻石居隆興寺嘗模廬山王翰須菩提像刻寺中其碑隂作天台五百尊者筆法竒古又于虎邱作石觀音像亦佳淳熙中人五栁堂者胡公稷言所作也其宅乃陸魯望故址所謂臨頓里是也楊懿儒按吳郡志儒作孺字彞父其先浦城人與方子通同時號吳中二老楊友夔字舜韶有文行許彥周云舜韶長㒒十餘歲向同在姑蘇時盜發孫堅墓楊作詩云闔閭城南荒古邱昔誰葬者孫豫州久無行客為下馬時有牧童來放牛嗚呼舜韶今亡矣他詩皆工必可傳世也孫實字若虛郡人少負俊聲特好滑稽談笑有味壯遊鄉校同舍多出田里富家以孫之貧不甚加禮而一牛姓者尤所侮玩因作牛秀才賦嘲之中有云腰帶頭垂尚有田單之火幞頭角上猶聞寧戚之歌賦成聞者絶倒是時樂圃先生朱長文為州學教授命其父訓飭之遂發憤適京師入太學登第而歸仕至朝奉大夫知光州卒丁晉公自光州歸葬華山所居在大郎橋堂宇甚古有層閣數間臨其後諸孫德隅善篆亦工於四六鄭宣徽戬字天休居臯橋葬橫山林槩字叔平本長樂人徙居吳中有子六人曰希字子中旦字次中邵字才中頴字傳中相繼俱登科級二蚤卒希為知樞密院事諡文節旦為殿中侍御史邵為顯謨閣學士諡正肅頴為光祿卿希之子虛中詞科旦之子虙亦登第有文行邵之子攄賜出身為中書侍郎近世儒門之盛必推林氏云王仲言聞之陳齊之云林叔平仁宗朝老儒也其子希旦邵穎俱擅克家之業叔平歿時有二子尚在襁褓未名既長兩兄乃拆其名示不忘父訓曰希曰旦曰邵曰穎後皆為聞人號衣冠名族葉少藴云今言平江府為吳下灌嬰傳云渡江破吳郡長吳下吳郡蓋平江也下槩言之猶稷言稷下敖倉言敖下云爾潘勺字叔治登第為吳興都掾後絶意祿仕遍遊天下佳山水有雁蕩百詠自號癸甲先生或問其故曰終始之義也後果以癸日卒甲日殮葉少藴又云吾鄉有老儒方惟深者字子通能詩嘗為王荆公所知用意精苦所居陋巷終日閉門遇有詩思即又閉其室步行其中引手瞋目若與人語或空中搏拏跳躍故里人戲之為方促鬼子通嘗徑造一園亭不遇主人自盤礴終日因題詩壁間云何年兀突亭前石昔日何人種松柏乘興間來就榻眠一枕清風君莫惜城西今古陽山色城中誰有千年宅來往何必見主人主人自是亭中客其灑落如此釋仲殊一日訪子通留詩云多年不見玉川翁今日相逢小樹東依舊清源無長物只餘松檜養秋風可見其清簡矣陳長方字齊之其先長樂人父侁字復之娶林大卿旦之女大雲翁虙之妹與陳瑩中交甚契瑩中謫亷州侁以書賀之至千餘言由此得罪又嘗從遊定夫深得治氣養心行巳接物之要故其子亦為道學之士齊之因外家居于步里終日閉户研究經史號唯室先生有步里客談漢唐論行於世其弟少方字同之亦端慧不羣號二陳章氏本建安人郇公之裔後徙居于吳者有二族子厚丞相家州南質夫樞密家州北兩第屹然輪奐相望為一州之甲吳人號南北章以别之吳郡城北五六里有一大冡在官塘之西相傳為唐陸宣公墓故其地名陸墓水名陸塘淳熙間有于墓傍得遺刻與所傳合郡人周虎張震發皆紀其事或者謂公雖郡人生于嘉興自貶忠州别駕薨于忠州其喪不曽還吳嘉興寶華寺乃公故宅按忠州圗經陸宣公墓在玉虛觀南三十步豈嘗藁葬于此又謂公已歸葬而忠州特設虛冡爾郡治之東有和令坊今名槐樹巷或以為楊和王存中所居而然非也按圗經在唐季巳有此名紹興初楊始籍為園垂三十年楊方進封和國雖事偶合亦先兆也史發運宅在帶城橋淳熙初宅成計其費一百五十萬緡僅一傳不能保僦直十萬緡久不售後為丁季卿以一萬五千緡得之紹定末丁又不能保趙汝櫄來為浙西提刑官占為百萬倉和糴場故老説發運初歸時舳艫相銜凡舟自葑門直接至其宅前用發運司按紙黏窗煮黏麵六七石自後僅易目前耳案此句語意未明似有脫悮萬卷堂環列書四十二厨寫本居多始則論斤買為故紙其後勢家每厨止得一十千席卷而去范雩字伯逹在太學嘗試禹稷顔回同道論學官見之以為竒作置之魁選遂馳譽京師學者至今以為模範入館除祕書郎成象成大即其子也郭氏本郡中小民所謂林酒仙者每至其家必解衣以醉之酒仙遷化前數日語郭氏曰疇昔荷相接之勤以藥一杯為報郭氏以味惡頗難之力強之飲三呷而止酒仙自舉而盡遂授以硃砂圓方曰惜乎富及三世爾郭氏竟售此藥四方爭求買之自此家大富三世之後絶無有欲之者張震發字元龍郡人嘉定七年袁省按盧熊蘇州府志作袁甫榜進士案此條疑有脫文孫仲益守郡日户口巳四十三萬按仲益孫覿之字考吳郡志引覿普明寺記云宣和間户至四十三萬中更蕩離幾於十室九空則此係追述之語非即覿守郡日實數也此條殊為舛誤且其語未畢亦似有脫文徐稚山侍郎有妹能詩大不類婦人女子所為其詩沖淡蕭然出俗自成一家姚濟字子齊郡人淳熙二年進士張季安陳少臯字舜卿按此條疑有脫誤朱沖微時以常賣為業後其家稍溫易為藥肆生理日益進以行不檢兩受徒刑既擁多資遂交結權要然亦能以濟人為心每春夏之交即出錢米藥物募醫官數人巡門問貧者之疾從而賙之又多買弊衣擇市嫗之善縫紉者製衲衣數百當大寒雪盡以給凍者其子勔因賂中貴人以花石得幸時時進奉不絶謂之花石綱凡林園亭館以至墳墓間所有一花一朩之竒怪者悉用黃紙封識不問其家徑取之浙人畏之如虎花石綱經從之地巡尉護送遇橋梁則徹以過舟雖以數千緡為之者亦毁之不恤初江淮發運司於真揚楚泗有轉搬倉綱運兵各處地方不相交越勔既進花石遂撥新裝運船充御前綱以載之而以舊者載糧運直逹京師轉搬倉遂廢糧運由此不繼禁衛至於乏食朝廷亦不之問也勔之寵日盛父子俱建節鉞即居第創雙節堂又畫徽宗御容置之一殿中監司郡守必就此朝朔望勔嘗豫內宴徽宗親握其臂與語勔遂以黃帛纒之與人揖不舉此臂弟姪數人皆結姻帝族夤緣得至顯官者甚衆勔有園極廣植牡丹數千本花時以繒綵為幕帟覆其上每花飾金為牌標其名如是者里許園夫畦子藝精種植及能疊石為山者朝釋負擔而暮紆金紫如是者不可數計園中有水閣作九曲路以入春時縱婦女遊賞有迷其道者沖設酒食邀之或遺以簪珥之屬人皆惡其醜行一日勔敗檢占其家資按原本家誤作官今改正有黃發勾者素與勔不協既被旨黎明造其室家人婦女盡驅之出雖閭巷小民之家無敢容納不數日已墟其園所謂牡丹者皆折以為薪每一花牌估直三錢勔誅又竄其家於海島前日之受誥身者盡裭之當時有謔詞譏之朱勔之葬其父盛飾一女奴一僮以殉之僮奴不知其死也欣欣然從柩而入壙靖康末大飢郡人怨毒入骨劫其壙而碎其骨初入壙門見骸骨二具猶志之曰此僮奴也秦檜妻之弟王㬇字顯道紹興初知府事峻於聚斂酷於用刑然其規為亦有可取者兵火之餘故墟瓦礫山積乃録入城小舟按原本作録入小城誤今從盧志改正出必載瓦礫以培塘人以為便石之破碎者積而焚之以泥官舍不賦於民而用有餘覺報寺其私家祠也黃堂前鎔錢鑄大士像而人不敢言每刺鹿血熱酒中飲之以求補益未幾疽發于脅而死葉少藴言吳人俚語若等人易得久瞋人易得醜雖鄙亦甚有理徐敦立言往嵗吳中多詩僧其名往往見於前輩文集中豫渡江之初猶見有規者頗以詩知名其為人性坦率其徒謂之規方外時年七十餘矣談論蕭散可喜臨終前數日有詩曰讀書巳覺眉稜重就枕方欣骨節和睡去不知天早晚西窗殘日巳無多葉左丞大愛之潘兊字説之吳人仕徽宗為侍從宣和初奉祠居里中時郡民朱勔以幸進寵眷無比父沖殂勔護喪歸葬鄉閭傾城出迓而潘獨不往潘之先塋適有山林形勢近沖新阡勔欲得之乃修敬于潘潘杜門不納勔恃恩自恣遣人諷之且席以薰天之勢潘一切拒之勔歸京師果訴于上御筆奪之已而又訹御史誣之以罪而褫潘之職雖抑之于一時而吳人至今稱之龔敦頤字養正和州人兵部侍郎原之曾孫居于郡中有史學念元祐諸臣以及建中靖國上書等人多表表立名節經崇寧禁錮靖康流離子孫不能盡存平生施為漫不可考慨然屬意求訪遺闕遂成列傳譜述一百卷凡名在兩籍三百九人按原本人誤作十今改正而書於編者三百五人其不可詳者四人而巳淳熙七年周益公必大修國史薦之得旨給札繕寫以進後七年洪景盧以翰林學士領史事復薦之得上州文學郟僑字喬年元豐中人幼學警悟案此下疑有脫文章季思其先池州人中徙浦城後因髙祖葬吳遂為郡人焉祖父皆隱約不仕季思嘗問學於朱文公隱居白屋出入徒步人稱之曰聘君貴之也平生足迹未嘗越州境而四方之人無不知有章季思士大夫過吳以不見為歉其為人慕尚如此作詩至多遇紙即書書成人人取去以此為樂終身不厭年七十八以疾終于家將卒時其正寢梁朩折壞有聲人皆異之郡人胡淳從季思學嵗時致醪醴薪米其卒也又代二子書世出內壙中淳字以初姑蘇李璋敏於戲調偶赴鄰人小集主人者雖富而素鄙會次適李坐其傍既進食璋視主人之前煎鮭魚特大於衆客璋即請主人曰璋與主人俱蘇人也每見人書蘇字不同其魚不知合在右邉是合在左邉是主人曰古人作字不拘一體移易從便也璋即引手取主人之魚示衆曰領主人指揮今日左邉之魚亦合從便權移過右邉如何一坐輟飯而笑有一故相逺派在姑蘇嘗題遊處壁曰大丞相再從姪某嘗遊璋題其傍曰混元皇帝三十七代孫李璋繼至吳俗好花與洛中不異其地土亦宜花古稱長洲茂苑以苑目之蓋有由矣吳中花朩不可殫述而獨牡丹芍藥為好尚之最而牡丹尤貴重焉舊寓居諸王皆種花往往零替花亦如之盛者唯藍叔成提刑家最好事有花三千株號萬花堂嘗移得洛中名品數種如玉碗白景雲紅瑞雲紅勝雲紅玉間金之類多以遊宦不能愛護輒死今惟勝雲紅在其次林得之知府家有花千株胡長文給事成居仁太尉吳謙之待制家種花亦不下林氏史志道發運家亦有五百株如畢推官希文韋承務俊心之屬多則數百株少亦不下一二百株習以成風矣至穀雨為花開之候置酒招賔就壇多以小青蓋或青幕覆之以障風日父老猶能言者不問親踈謂之看花局今之風俗不如舊然大槩賞花則為賔客之集矣方臘之起郡中令保甲巡護雖士流亦不免范無外率府學諸生冠帶夜行用大燈籠書一絶句於上曰自古輕儒孰若秦山河社稷付他人而今重士如周室忍使書生作夜巡太守聞之亟為罷去盛章作守頗嫚士范因元夕府會作寶鼎現詞投之極蒙嘉奬遺以酒五百尊其詞至今傳播袁鰲字可久崑山人紹興十二年進士有文齋雅記子宗仁中詞科甫里白蓮花寺乃陸魯望故宅之所後有祠堂貌像蓋當時物咸淳間有盛氏醉遊寺中因仆其像于水中則滿腹皆其平生詩文親藁也寺僧訟于郡時郡守倪普深怒之遂徙坐而更塑其像雖足少雪天隨之辱而無復昔時之腹藁矣黃子由尚書夫人胡元功尚書之女也俊敏強記經史諸書略能成誦善筆札時作詩文亦可觀於琴奕寫竹等藝尤精自號惠齋居士時人比之李易安云范文穆公成大晚嵗卜築于郡之盤門外十里蓋因闔廬所築越來溪之故基隨地勢髙下而為亭榭所植多名花而梅尤盛則築農圃堂對愣伽山臨石湖所謂姑蘇前後臺相距亦止半里耳孝宗嘗御書石湖二大字以賜之公作上梁文所謂吳波萬頃偶維風雨之舟越戍千年按原本戍誤作戊千誤作午今改正因築湖山之觀者是也又有北山堂千巗觀天鏡閣夀櫟堂他亭宇尚多一時勝士賦詠無不極鋪張之美乾道壬辰三月上巳周益公必大以春官去國過公招飲圃中夜分留題壁間云吳臺越壘距盤門才十里而陸沉荒煙野草者千七百年紫薇舍人始創别墅登臨之勝甲於東南豈鴟夷子成功于此扁舟去之天閟絶景須苖裔之賢者然後享其樂耶公為之擊節而前後所題盡廢焉黃端冕家有白鹿岩梅溪鹿苑臺銘記云維定武六年按歷代帝王紀元無定武年號惟吳大帝建元黃武定字或是黃字之訛八月日銘大晉永和七年嵗在辛亥三月十九日平原內史陸機再建立案陸機乃西晉人不及永和此條蓋出偽託華陽真逸書字畫蓋王逸少書端冕以為視此刻則瘞鶴銘為右軍書無疑矣端冕名纓其先建安人居光福山中父榮直祕閣端冕宣和末屢上書言事李丞相綱為行營使嘗居幕府邅亂還鄉紹興初有文名其後有名簡字元易者博學強記善談吐能為詩樂府所著有東浦集雲墅談雋端冕之弟黃司理緯字師文善醫有竒中喻子才其妹之夫也朝補之云近見蘇子美墨迹一卷皆自書其所作詩行草爛然龍蛇飛動其中有獨酌詩云一酌澆腸俗慮奔鷃微鵬大豈堪論楚靈當日能知此肯入滄江作旅魂卷尾題云慶歷乙酉十月書於姑蘇驛今考其詩蓋是被罪之明年居滄浪亭時所書其詩語放曠如此或謂流落幽憂以終非也清源莊季裕云建炎三年寓長洲縣彭華鄉髙景山北白馬澗張氏舍時山上設烽火日舉以報平安留月餘即過浙東臨行書一絶于壁間云昔年領牒佐邉侯愁望長安向戍樓今日衰顔來澤國又看烽火照長洲是冬金人犯杭越明年春由平江以歸白馬澗去城十八里有宅百餘區盡被焚毁獨留余所居于壁邉題耿先生到此不燒七字畢良史字少董一字伯瑞東平人丞相文簡公五世孫風度凝逺少遊京師四舉禮部不中出入貴人之間邅亂南渡僑寓興國軍江西漕蔣璨喜其鑒辨博洽資給令赴行在遂以博古説動諸內侍內侍皆喜之上方搜古器書畫之屬恨未有能辨其真偽者得良史甚恱月給餐錢五十千仍令內侍延請為門客又得束修百餘千而食客滿門隨有輒盡用族人恩澤補上州文學紹興中為東京留守屬官推知東明縣東京再陷即罷從事留北境三年著春秋正辭論語探古有宋城哲夫李師微願良執經師之宋執一卷書背立且讀且止李執一卷書向其師若有問者而良史坐一榻上後有二女奴各有所執而阿冬者坐其間良史之季子也女奴之髽者曰孫夀冠者曰馬惠真好事者寫為翻經圖陷北境時嘗褐衣走間道即以蠟書上之泗上繼好勑隨蕭誼以歸歸日進所著書改秩升朝後以直敷文閣知旴𣅿軍以卒子希文希旦至今子孫多居吳中云潘夢旗字天錫郡人慶元二年鄒應龍榜進士及第所著有漢兵編程泳之沂伊川先生之孫知崑山縣秩滿其弟巨為府監倉乃擕其家就居焉王陔字希武參知政事綯之子有第宅在崑山紹興三年癸丑八月五日長洲縣地震自西北方來樹林皆搖蕩父老云元祐九年九月二十一日嘗如此又紹興十三年癸亥三月十五日清明大雪盈尺郡人潘擇可崇寧五年以舍法貢入京未至夜夢衣褐挽車三十兩其弟端夫衣緑隨其後政和三年擇可以上舍釋褐後三十年端夫始就恩科乃悟挽車三十者三十載也孫價字元善居郡中其子紹逺字稽仲提舉福建常平紹祖字文仲錢俁字維大郡人趙逵榜進士及第嘗任著作郎將作少監李益字彥中郡人嘉王按宋史徽宗重和元年策進士有司以嘉王楷第一帝不欲楷先多士遂以王昂為榜首則此應作王昂榜上舍出身魏志字幾道郡人紹興四年進士盧彥仁龍圗閣直學士秉之孫姑蘇雍熙寺每月夜向半常有婦人往來廊廡間歌小詞且笑且歎聞者就之輒不見其詞云滿目江山憶舊遊汀洲花草弄春柔長亭􅋈住朩蘭舟好夢易隨流水去芳心空逐曉雲愁行人莫上望京樓好事者録藏之士子慕容嵓卿見之驚曰此豫亡妻所為外人無知者君何從得之客告之故嵓卿悲歎曰此寺蓋其旅襯所在也竹坡詩話魏鑄紹興間人善書學虞世南孔廟記太和宮碑是其迹麋師旦字周卿吳人紹興戊辰登科紹熙庚戌為江東轉運主管官蜀相士楊生謂于相法當有肉峯生頂上愈壯則愈顯後果有肉隆然癸丑嵗為嘉禾守楊復訪之則峯益髙麋嘗歷御史主簿袐書郎春秋幾七十年矣然才至左司郎中卒于乙卯夷堅志吳仁傑字斗南其先洛陽人居吳中父信舉進士官至國子學録弟仁輔子樗陸知微吳人靖康中為開封尉氏丞林璞字伯振琰字玉圭乾道五年同登進士第琰善篆王曉字浚明何簔衣呆道僧二事見夷堅辛志按此條疑有脫誤淳熙巳未嵗夏秋之交天久不雨所在苦旱吳郡醮祭踰月不效通判趙師瑀怒見於色適有寓客林通判光祖自少奉道得法于路真官有起龍致雨符其應如響趙具詞瀝懇于林林為飛牘奏三境上言檄告水府令其子永夀偕趙客陳擇齎往林屋洞投之洞蓋太湖龍窟土民云欲雨時則洞口出雲如饙餾兩人涉巨浸抵靈佑觀集道流具香几詣洞焚檄竟褰裳以入其前嘉朩一本童童若幢云郡城北數里有古石幢唐徐浩書太守陳師錫徙置府第鄉人夜過河上者多見鬼物乃相與請于州復置舊處其怪遂絶至和中樂安公守姑蘇日虎邱崖下水涌出竹簡數十小片皆朱書有孝建年號蓋宋武時紀年也蔣頴叔自記于手藁其孫世昌録收之和靖尹先生去經筵寓虎邱之西庵榜曰三畏齋嘉定初丁焴晦父通守吳郡乃建祠堂于其後范文正公典鄉郡首建學聘安定胡先生條立學規講堂照壁猶是當時故物元統二年劉漢臣者為教授乃拆以造其女奩具未幾失火獨焚其廬而文正公之祠巋然無恙樂備字功成本淮海人寓居崑山以文學名于時登紹興二十四年進士第仕至軍器監簿顔度字魯子兗國公五十三世孫由唐魯公之兄子按萬姓統譜顔魯公兄子皓為常熟令原本作魯公之孫子誤今改正仕常熟遂為吳人舉進士以文章政事名一時仕至工部侍郎孝宗嘗謂度每出一言不動如山弟字叔修子叔平字景晏從子叔玠字景圭叔瑜字粹中叔剛字某皆擢髙第叔并字景容叔璵字器之特奏名其子孫皆居在真慶坊顔直之字方叔世為郡之長洲人生而端厚頴悟異常好讀書靡不涉獵以弓矢應格差監省倉即丐祠養親主管建昌軍仙都觀自號樂間居士作退靜齋媻婆其間幅巾危坐焚香撫琴意泊如也平生好施與尤樂以藥石濟疾苦賴以全活者甚衆備物致用率以智創輒出人意表工小篆得詛楚文筆意嘗與參政樓公鑰書攻愧齋榜愧字采之齊侯鎛樓公意以為與巳合賦詩美之所著有集古篆韻二十卷瘍醫方論外科會海痬醫本草等書公氣豐碩善攝生不邇聲色而年止五十一以嘉定十五年五月甲寅卒墓在吳縣至德鄉雅宜山子汝霖汝礪汝勛汝勛字元老有清行少傅趙師貢以郊恩奏得官主溫州永嘉簿江隂軍録參兩浙轉運司帳管改官主管文字知和州含山縣監左藏西庫辟淮東安撫司機宜文字通判滁常二州慶元府俱不赴奉祠雲臺觀官至朝散大夫至元二十八年八月四日卒年八十七吳中舊事
